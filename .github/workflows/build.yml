name: Build (Windows)

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    strategy:
      fail-fast: false
      matrix:
        configuration: [ "Release" ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Pick build target
        id: pick
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          if (Test-Path ".\BuildAll_Release_net.csproj") {
            "target=BuildAll_Release_net.csproj" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "kind=csproj" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            Write-Host "Selected: BuildAll_Release_net.csproj"
            exit 0
          }

          $sln = Get-ChildItem -Path . -Filter *.sln -File | Select-Object -First 1
          if ($sln) {
            "target=$($sln.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "kind=sln" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            Write-Host "Selected: $($sln.Name)"
            exit 0
          }

          $csproj = Get-ChildItem -Path . -Filter *.csproj -File | Select-Object -First 1
          if ($csproj) {
            "target=$($csproj.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "kind=csproj" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            Write-Host "Selected: $($csproj.Name)"
            exit 0
          }

          throw "No BuildAll_Release_net.csproj, .sln, or root .csproj found to build."

      - name: Restore
        shell: pwsh
        env:
          MSBUILDDISABLENODEREUSE: "1"
        run: |
          $ErrorActionPreference = 'Stop'
          $t = '${{ steps.pick.outputs.target }}'
          msbuild $t `
            /t:Restore `
            /m:1 /nr:false /v:m `
            /p:Configuration=${{ matrix.configuration }} `
            /p:UseSharedCompilation=false

      - name: Build
        shell: pwsh
        env:
          MSBUILDDISABLENODEREUSE: "1"
        run: |
          $ErrorActionPreference = 'Stop'
          $t = '${{ steps.pick.outputs.target }}'
          msbuild $t `
            /t:Rebuild `
            /m:1 /nr:false /v:m `
            /p:Configuration=${{ matrix.configuration }} `
            /p:UseSharedCompilation=false
